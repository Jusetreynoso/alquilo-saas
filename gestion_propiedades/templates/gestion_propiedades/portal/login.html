{% extends 'gestion_propiedades/portal/portal_base.html' %}

{% block title %}Ingresar a mi portal{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card-elegant text-center" style="width: 100%; max-width: 400px;">
        <div class="mb-4">
            <i class="fa-solid fa-house-chimney-window text-primary" style="font-size: 3rem;"></i>
        </div>
        <h3 class="mb-2 fw-bold">Portal del Inquilino</h3>
        <p class="text-muted mb-4">Ingresa con los datos proporcionados por tu administrador de renta.</p>
        
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3 text-start">
                <label class="form-label fw-bold text-secondary text-uppercase small">Correo Electrónico</label>
                <input type="email" name="correo" class="form-control form-control-lg bg-light border-0" placeholder="ejemplo@correo.com" required>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label fw-bold text-secondary text-uppercase small">Cédula o Pasaporte</label>
                <input type="text" name="cedula" class="form-control form-control-lg bg-light border-0" placeholder="000-0000000-0" required>
                <div class="form-text mt-2"><i class="fa-solid fa-lock text-success"></i> Acceso seguro y encriptado</div>
            </div>
            
            <button type="submit" class="btn btn-portal btn-lg">Entrar al portal <i class="fa-solid fa-arrow-right ms-2"></i></button>
        </form>
    </div>
</div>
{% endblock %}
