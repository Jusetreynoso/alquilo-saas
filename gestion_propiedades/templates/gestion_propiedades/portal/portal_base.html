<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}Portal del Inquilino{% endblock %} | Alquilo</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #f8fafc;
            --portal-blue: #3b82f6;
            --portal-dark: #1e293b;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-bg);
            color: var(--portal-dark);
            -webkit-font-smoothing: antialiased;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Outfit', sans-serif;
        }
        .portal-navbar {
            background-color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            padding: 15px 20px;
        }
        .portal-brand {
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--portal-blue);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .portal-content {
            padding: 20px 10px;
            max-width: 600px;
            margin: 0 auto;
        }
        .card-elegant {
            background: white;
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
            padding: 20px;
            margin-bottom: 20px;
        }
        .btn-portal {
            background: linear-gradient(135deg, var(--portal-blue), #2563eb);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px 20px;
            font-weight: 600;
            width: 100%;
            transition: transform 0.2s;
        }
        .btn-portal:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    {% if request.session.inquilino_id %}
    <nav class="portal-navbar d-flex justify-content-between align-items-center">
        <a href="{% url 'portal_dashboard' %}" class="portal-brand">
            <i class="fa-solid fa-house-user"></i> Mi Alquiler
        </a>
        <a href="{% url 'portal_logout' %}" class="text-danger text-decoration-none fw-bold">
            <i class="fa-solid fa-power-off"></i> Salir
        </a>
    </nav>
    {% endif %}

    <div class="portal-content">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show rounded-4" role="alert">
                    <i class="fa-solid fa-circle-info me-2"></i> {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
