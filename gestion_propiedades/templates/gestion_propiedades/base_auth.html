<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Alquilo Suite{% endblock %}</title>
    <!-- Fonts: Outfit and Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --input-bg: rgba(15, 23, 42, 0.6);
            --input-border: rgba(255, 255, 255, 0.1);
            --accent: #38bdf8;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(79, 70, 229, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(56, 189, 248, 0.15), transparent 25%);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow-x: hidden;
        }

        /* Glassmorphism Card Additions */
        .auth-container {
            width: 100%;
            max-width: 440px;
            margin: 1.5rem;
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .auth-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
        }

        /* Logo formatting */
        .auth-logo-icon {
            font-size: 2.5rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        
        .auth-title {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.75rem;
            margin-bottom: 0.25rem;
            color: white;
        }

        .auth-subtitle {
            color: var(--text-muted);
            font-weight: 400;
            font-size: 0.95rem;
            margin-bottom: 2.5rem;
        }

        /* Inputs */
        .form-label {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .form-control {
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            color: white;
            border-radius: 12px;
            padding: 0.875rem 1.25rem;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background-color: rgba(15, 23, 42, 0.8);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1);
            color: white;
        }
        
        .form-control::placeholder {
            color: rgba(148, 163, 184, 0.5);
        }

        /* Buttons */
        .btn-primary {
            background: var(--primary-gradient);
            border: none;
            border-radius: 12px;
            padding: 0.875rem;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.025em;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            color: white;
            width: 100%;
            margin-top: 1rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(124, 58, 237, 0.7);
        }

        .btn-primary:active {
            transform: translateY(0);
        }
        
        .btn-secondary-outline {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            border-radius: 12px;
            padding: 0.875rem;
            font-weight: 600;
            text-align: center;
            display: block;
            text-decoration: none;
            transition: all 0.2s ease;
            margin-top: 1rem;
        }
        
        .btn-secondary-outline:hover {
            background: rgba(255,255,255,0.05);
            color: white;
        }

        /* Links */
        .auth-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: opacity 0.2s ease;
        }

        .auth-link:hover {
            opacity: 0.8;
            color: var(--accent);
        }
        
        /* Floating background shapes for extra dimension */
        .shape {
            position: absolute;
            filter: blur(60px);
            z-index: 1;
            opacity: 0.5;
            border-radius: 50%;
            animation: float 10s ease-in-out infinite;
        }
        .shape-1 { left: -100px; top: -100px; width: 300px; height: 300px; background: rgba(79, 70, 229, 0.4); }
        .shape-2 { right: -50px; bottom: -100px; width: 250px; height: 250px; background: rgba(124, 58, 237, 0.4); animation-delay: -5s; }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .alert-custom {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            border-radius: 12px;
            padding: 1rem;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        
        .alert-success-custom {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
            border-radius: 12px;
            padding: 1rem;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <!-- Ornamental background shapes -->
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="text-center">
                <div class="auth-logo-icon">
                    <i class="fa-solid fa-building-user"></i>
                </div>
                <h1 class="auth-title">Alquilo Suite</h1>
                <p class="auth-subtitle">Gestión Inteligente de Inmuebles</p>
            </div>
            
            {% block content %}
            {% endblock %}
        </div>
        
        <div class="auth-footer">
            © {% now "Y" %} Alquilo. Todos los derechos reservados.
        </div>
    </div>

</body>
</html>
